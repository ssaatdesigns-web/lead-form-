<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>SAAT Designs Lead Form</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:40px;
display:flex;
justify-content:center;
}

.container{
width:700px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
margin-top:0;
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:14px;
border-radius:6px;
border:1px solid #ddd;
}

button{
background:#0b5cff;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#094ad1;
}

.msg{
margin-top:10px;
font-size:14px;
white-space:pre-wrap;
}

.msg.ok{color:green;}
.msg.bad{color:red;}

.section{
margin-top:40px;
padding-top:20px;
border-top:1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

<h1>SAAT Designs Lead Form</h1>

<form id="leadForm">

<input name="name" placeholder="Name" required>

<input name="phone" placeholder="Phone" required>

<input name="email" placeholder="Email" type="email">

<input name="city" placeholder="City">

<input name="state" placeholder="State">

<input name="pincode" placeholder="Pincode">

<select name="intent">
<option value="buy">Buy</option>
<option value="rent">Rent</option>
</select>

<select name="bhk">
<option value="studio">Studio</option>
<option value="1bhk">1 BHK</option>
<option value="2bhk">2 BHK</option>
<option value="3bhk">3 BHK</option>
<option value="4bhk">4 BHK</option>
<option value="4+bhk">4+ BHK</option>
<option value="other">Other</option>
</select>

<select name="interest_level">
<option value="interested">Interested</option>
<option value="highly_interested">Highly interested</option>
<option value="extremely_sure">Extremely sure</option>
</select>

<button type="submit">Submit Lead</button>

</form>

<p id="msg" class="msg"></p>


<div class="section">

<h2>Admin: Import Excel Leads</h2>

<input type="file" id="excelFile" accept=".xls,.xlsx">

<input id="batchSize" type="number" value="25">

<button id="importBtn">Import Leads</button>

<p id="importMsg" class="msg"></p>

</div>

</div>


<script>

const API="https://realestate-ai-leads-9kso.vercel.app/api/leads"


/* ------------------------
FORM SUBMIT
------------------------ */

const form=document.getElementById("leadForm")
const msg=document.getElementById("msg")

form.addEventListener("submit",async e=>{

e.preventDefault()

msg.textContent="Submitting..."

const payload=Object.fromEntries(new FormData(form).entries())

payload.phone=(payload.phone||"").replace(/\D/g,"")

try{

const res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
})

const json=await res.json()

if(!res.ok) throw new Error(json.error||"Failed")

msg.className="msg ok"
msg.textContent="Submitted successfully"

form.reset()

}
catch(err){

msg.className="msg bad"
msg.textContent="Error: "+err.message

}

})


/* ------------------------
EXCEL IMPORT
------------------------ */

const excelFile=document.getElementById("excelFile")
const importBtn=document.getElementById("importBtn")
const importMsg=document.getElementById("importMsg")

let parsedRows=[]


excelFile.addEventListener("change",async()=>{

const file=excelFile.files[0]

if(!file)return

const buf=await file.arrayBuffer()

const wb=XLSX.read(buf,{type:"array"})

const sheet=wb.Sheets[wb.SheetNames[0]]

const rows=XLSX.utils.sheet_to_json(sheet,{defval:""})

parsedRows=rows.map(r=>{

const name=r.full_name||r.name||""

const phone=String(r.phone_number||r.phone||"").replace(/\D/g,"")

const bhk=String(r.all_right_please_select_the_flat_type||"").toLowerCase()

return{

name:name,
full_name:name,

phone:phone,

email:"",
city:"",
state:"",
pincode:"",

intent:"buy",

bhk:bhk,

interest_level:"interested",

source:"excel_import",

raw_payload:r

}

})

importMsg.textContent=`Loaded ${parsedRows.length} rows`

})



/* ------------------------
IMPORT BUTTON
------------------------ */

importBtn.addEventListener("click",async()=>{

if(!parsedRows.length)return

let ok=0
let fail=0

const batchSize=parseInt(document.getElementById("batchSize").value)||25

importMsg.textContent="Starting import..."

for(let i=0;i<parsedRows.length;i+=batchSize){

const batch=parsedRows.slice(i,i+batchSize)


/* -------- DEBUG BLOCK YOU ASKED -------- */

for (const row of batch) {
  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(row),
    });

    let bodyText = "";
    try { bodyText = await res.text(); } catch {}

    if (!res.ok) {
      fail++;
      if (fail <= 5) {
        importMsg.className = "msg bad";
        importMsg.textContent =
          `FAILED (example error ${fail})\n` +
          `Status: ${res.status}\n` +
          `Response: ${bodyText}\n\n` +
          importMsg.textContent;
      }
      continue;
    }

    ok++;
  } catch (e) {
    fail++;
    if (fail <= 5) {
      importMsg.className = "msg bad";
      importMsg.textContent =
        `FETCH FAILED (example error ${fail})\n` +
        `Error: ${e?.message || String(e)}\n\n` +
        importMsg.textContent;
    }
  }
}


/* -------- END DEBUG BLOCK -------- */

importMsg.textContent=
`Progress
Success: ${ok}
Failed: ${fail}
Processed: ${Math.min(i+batchSize,parsedRows.length)} / ${parsedRows.length}`

}

importMsg.textContent=
`Import finished
Success: ${ok}
Failed: ${fail}`

})

</script>

</body>
</html>
